# nginx/ainews.conf
# 安装路径：/etc/nginx/sites-available/ainews.conf
# 启用链接：ln -s /etc/nginx/sites-available/ainews.conf /etc/nginx/sites-enabled/
# 申请证书：sudo certbot --nginx -d your-domain.com

# Gzip 压缩
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name your-domain.com;    # ← 替换为你的域名或 IP

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    server_name your-domain.com;    # ← 替换为你的域名

    # SSL 证书（certbot 自动生成后回填）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全响应头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 超时设置
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # 反向代理到 Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存
    location /static/ {
        proxy_pass http://127.0.0.1:5000;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # 健康检查（不记录日志）
    location /api/health {
        proxy_pass http://127.0.0.1:5000;
        access_log off;
    }
}
