# Alpha Vault - US/HK AI Investment Research System
# Restart service after modification

app:
  name: "Alpha Vault"
  version: "3.0.0"
  host: "0.0.0.0"
  port: 8000
  debug: false

# News data sources (multi-source aggregation)
# Register free API keys:
#   Finnhub: https://finnhub.io/register (60 calls/min free)
#   MarketAux: https://www.marketaux.com/register (free tier)
# Sources without keys (Yahoo Finance, Google News RSS, SEC EDGAR) always active
news_sources:
  finnhub_key: "d7b4k99r01qtpbhagi9gd7b4k99r01qtpbhagia0"
  marketaux_key: "tL0IdnccE8E1iJCRZWqvAGTg7UzQ294rNi05rhng"
  max_per_source: 10
  max_total: 15

# LLM settings (OpenAI API compatible, via OpenClaw local gateway)
llm:
  enabled: true
  base_url: "http://127.0.0.1:18789/v1"
  model: "openclaw/default"
  api_key: "1896f74b7ed4be3d81c1883434d9ae5ccaa673991ecdc2a0"
  temperature: 0.3
  max_tokens: 8192   # raised from 4096 to avoid truncation of batched agent outputs
  timeout: 180

# LLM Agent settings (6-layer: screen->enrich->news_agent->tech_agent->synthesis->risk_control)
agent:
  enabled: true
  news_version: "news-sentiment-v2"
  tech_version: "technical-v2"
  max_retries: 2
  batch_size: 60

  fallback:
    base_score: 50
    ma_bullish_bonus: 12
    ma_short_golden_bonus: 5
    ma_bearish_penalty: 10
    volume_ratio_strong: 1.5
    volume_strong_bonus: 8
    volume_ratio_medium: 1.0
    volume_medium_bonus: 3
    entry_discount: 0.995
    stop_loss_pct: 0.95
    take_profit_pct: 1.08
    holding_days: 3

# Built-in scheduler (triggers pipelines independently per market)
# Times are in each market's LOCAL timezone (scheduler uses market TZ)
# US: 07:30 ET = 19:30 Beijing (2h before US open 09:30 ET)
# HK: 07:30 HKT = 07:30 Beijing (2h before HK open 09:30 HKT)
scheduler:
  enabled: true
  us_run_time: "07:30"
  hk_run_time: ""
  # v11: Stage-2 recalibration. At this time each trading day, the system
  # fetches the real post-open price and recomputes entry/SL/TP. Tickers that
  # gapped more than 3% vs Stage-1 reference are aborted. Leave empty to
  # disable stage-2 (not recommended for US trading).
  us_recalibrate_time: "09:35"

# Pipeline parameters
pipeline:
  max_candidates: 40   # v9: only top-10 reach users, cut LLM token ~33%
  max_recommendations: 5   # hard ceiling for single-strategy mode only.
                           # dual mode uses per-tier quotas below.

  # v10: Market-cap tiered screening.
  # Stocks are partitioned by market cap; each tier is scored and ranked
  # within itself (so small caps don't dominate via their larger % moves).
  # The final candidate pool is drawn according to each tier's quota.
  #
  # Boundaries: Large >= $50B, Mid $10B-$50B, Small $2B-$10B.
  # (These are re-derived from the actual SP500∪NDX∪SP400 distribution; when
  # R2000 holdings are added, Small floor will drop to $500M.)
  tiers:
    enabled: true                 # set false to fall back to v9 flat scoring
    large:
      candidate_quota: 15         # # of candidates entering Layer 2 (LLM)
      short_term_quota: 2         # final recommendations (short-term bucket)
      swing_quota: 2              # final recommendations (swing bucket)
      optimal_vol_short: 0.018    # 1.8%/day is "exciting" for a mega-cap
      optimal_vol_swing: 0.012
      news_weight: 0.20           # mega-cap news often priced in minutes
      tech_weight: 0.55
      fundamental_weight: 0.25    # fundamentals are reliable at scale
    mid:
      candidate_quota: 15
      short_term_quota: 2
      swing_quota: 1
      optimal_vol_short: 0.028
      optimal_vol_swing: 0.020
      news_weight: 0.30           # mid-cap news highest signal/noise ratio
      tech_weight: 0.55
      fundamental_weight: 0.15
    small:
      candidate_quota: 10
      short_term_quota: 1
      swing_quota: 0              # small-cap swing is too noisy, short only
      optimal_vol_short: 0.045
      optimal_vol_swing: 0.030
      news_weight: 0.45           # small-cap news drives most of the alpha
      tech_weight: 0.50
      fundamental_weight: 0.05    # small-cap financials are unreliable

  screening:
    min_market_cap: 1.0e9
    min_avg_volume: 500000
    min_dollar_volume: 1.0e8       # $100M snapshot (Stage A fast pre-filter)
    min_avg_dollar_volume_20d: 2.0e8  # $200M 20-day avg (Stage B precise)
    min_turnover_ratio: 0.003
    max_pb: 15.0
    # v10: asymmetric daily-change filter (was symmetric ±10%)
    # +N% -> already run up, chasing hurts R:R -> skip
    # -N% -> potential reversal, send to reversal branch instead of rejecting
    max_upside_today_pct: 5.0      # reject if today's change > +5%
    reversal_trigger_pct: -8.0     # flag for reversal branch if <= -8%
    max_daily_change_pct: 10.0     # legacy safety cap (still enforced)
    # v5: 5-factor model (sum = 1.0)
    weight_acceleration: 0.25
    weight_volume_anomaly: 0.20
    weight_trend_setup: 0.30
    weight_volatility_fit: 0.10
    weight_fundamental: 0.15
    min_absolute_score: 35.0
    # Legacy fallbacks (used only when tiers.enabled=false)
    optimal_vol_short: 0.025
    optimal_vol_swing: 0.018
    optimal_vol_width: 0.025

  synthesis:
    news_weight: 0.15
    tech_weight: 0.55
    fundamental_weight: 0.30
    min_confidence: 58
    quality_threshold: 55
    adaptive_threshold_drop: 15
    adaptive_threshold_floor: 50
    cross_fill_factor: 0.3
    # v7: Quality tier boundaries (conviction_score = combined x (conf/100)^0.7)
    high_min_conviction: 42       # Full recommendation with trading params
    medium_min_conviction: 28     # Recommendation with caution label
    low_min_conviction: 15        # Watch-only, no trading params
    # v7: Top-N output per regime
    top_n_normal: 5
    top_n_cautious: 5
    top_n_bearish: 3

  short_term:
    max_recommendations: 5
    news_weight: 0.40
    tech_weight: 0.55
    fundamental_weight: 0.05
    # v4: ATR-based TP/SL - these are FALLBACKS when ATR is unavailable
    default_stop_loss_pct: 0.97       # -3% (was -5%)
    default_take_profit_pct: 1.05     # +5% (was +8%)
    take_profit_2_pct: 1.08           # +8% (was +12%)
    # ATR multipliers for dynamic TP/SL
    atr_sl_multiplier: 2.0            # SL = entry - 2.0 x ATR (room to breathe)
    atr_tp_multiplier: 3.0            # TP = entry + 3.0 x ATR (R:R = 1.5)
    # v3.x: Defensive multipliers for cautious/bearish regime
    atr_sl_multiplier_defensive: 1.5
    atr_tp_multiplier_defensive: 2.0
    min_rr_defensive: 1.2
    default_holding_days: 3
    max_holding_days: 5
    # v4.1: trailing stop & SL bounds
    trailing_activation_pct: 0.50
    trailing_distance_pct: 0.40
    sl_max_pct: 0.06
    sl_min_pct: 0.015

  swing:
    max_recommendations: 5
    news_weight: 0.40
    tech_weight: 0.35
    fundamental_weight: 0.25
    default_stop_loss_pct: 0.94       # -6% (was -8%)
    default_take_profit_pct: 1.12     # +12% (was +15%)
    take_profit_2_pct: 1.20           # +20% (was +25%)
    atr_sl_multiplier: 2.0
    atr_tp_multiplier: 3.5
    # v3.x: Defensive multipliers for cautious/bearish regime
    atr_sl_multiplier_defensive: 1.5
    atr_tp_multiplier_defensive: 2.5
    min_rr_defensive: 1.3
    default_holding_days: 10
    max_holding_days: 30
    # v4.1: trailing stop & SL bounds
    trailing_activation_pct: 0.40
    trailing_distance_pct: 0.35
    sl_max_pct: 0.10
    sl_min_pct: 0.015
    # v7: Top-N output per regime
    top_n_normal: 3
    top_n_cautious: 3
    top_n_bearish: 2

  win_rate:
    short_retention_days: 21
    swing_retention_days: 90
    evaluation_retention_days: 21
    enable_auto_cleanup: true

# Stock pool
stock_pool:
  us_stock:
    - index: "^GSPC"
      name: "S&P 500"
    - index: "^NDX"
      name: "Nasdaq 100"
  hk_stock:
    - index: "^HSI"
      name: "Hang Seng Index"
    - index: "^HSTECH"
      name: "Hang Seng Tech"

# Market parameters
market:
  us_stock:
    currency: "USD"
    currency_symbol: "$"
    timezone: "America/New_York"
    trading_hours: "09:30-16:00"
  hk_stock:
    currency: "HKD"
    currency_symbol: "HK$"
    timezone: "Asia/Hong_Kong"
    trading_hours: "09:30-16:00"
