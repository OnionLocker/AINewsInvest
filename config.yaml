# Alpha Vault - US/HK AI Investment Research System
# Restart service after modification

app:
  name: "Alpha Vault"
  version: "3.0.0"
  host: "0.0.0.0"
  port: 8000
  debug: false

# News data sources (multi-source aggregation)
# Register free API keys:
#   Finnhub: https://finnhub.io/register (60 calls/min free)
#   MarketAux: https://www.marketaux.com/register (free tier)
# Sources without keys (Yahoo Finance, Google News RSS, SEC EDGAR) always active
news_sources:
  finnhub_key: ""
  marketaux_key: ""
  max_per_source: 10
  max_total: 15

# LLM settings (OpenAI API compatible)
llm:
  enabled: true
  base_url: "https://gmncode.cn/v1"
  model: "gpt-5.4"
  api_key: "sk-8969e7ef4a82ad508a702cf1c1587705d0d3c9355186db3d111f3ee392be2ef1"
  temperature: 0.3
  max_tokens: 4096
  timeout: 180

# LLM Agent settings (6-layer: screen->enrich->news_agent->tech_agent->synthesis->risk_control)
agent:
  enabled: true
  news_version: "news-sentiment-v2"
  tech_version: "technical-v2"
  max_retries: 2
  batch_size: 30

  fallback:
    base_score: 50
    ma_bullish_bonus: 12
    ma_short_golden_bonus: 5
    ma_bearish_penalty: 10
    volume_ratio_strong: 1.5
    volume_strong_bonus: 8
    volume_ratio_medium: 1.0
    volume_medium_bonus: 3
    entry_discount: 0.995
    stop_loss_pct: 0.95
    take_profit_pct: 1.08
    holding_days: 3

# Built-in scheduler (triggers pipelines independently per market)
# Times are in each market's LOCAL timezone (scheduler uses market TZ)
# US: 07:30 ET = 19:30 Beijing (2h before US open 09:30 ET)
# HK: 07:30 HKT = 07:30 Beijing (2h before HK open 09:30 HKT)
scheduler:
  enabled: true
  us_run_time: "07:30"
  hk_run_time: "07:30"

# Pipeline parameters
pipeline:
  max_candidates: 40
  max_recommendations: 5

  screening:
    min_market_cap: 1.0e9
    min_avg_volume: 500000
    max_pb: 15.0
    max_daily_change_pct: 10.0
    # v5: 5-factor model (sum = 1.0)
    weight_acceleration: 0.25
    weight_volume_anomaly: 0.20
    weight_trend_setup: 0.30
    weight_volatility_fit: 0.10
    weight_fundamental: 0.15
    # Absolute quality gate — below this score, don't recommend at all
    min_absolute_score: 35.0
    # Volatility fit — strategy-aware optimal daily volatility
    optimal_vol_short: 0.025
    optimal_vol_swing: 0.018
    optimal_vol_width: 0.025

  synthesis:
    news_weight: 0.15
    tech_weight: 0.55
    fundamental_weight: 0.30
    min_confidence: 65
    quality_threshold: 60
    adaptive_threshold_drop: 15
    adaptive_threshold_floor: 55
    cross_fill_factor: 0.3

  short_term:
    max_recommendations: 5
    news_weight: 0.40
    tech_weight: 0.55
    fundamental_weight: 0.05
    # v4: ATR-based TP/SL — these are FALLBACKS when ATR is unavailable
    default_stop_loss_pct: 0.97       # -3% (was -5%)
    default_take_profit_pct: 1.05     # +5% (was +8%)
    take_profit_2_pct: 1.08           # +8% (was +12%)
    # ATR multipliers for dynamic TP/SL
    atr_sl_multiplier: 2.0            # SL = entry - 2.0 × ATR (room to breathe)
    atr_tp_multiplier: 3.0            # TP = entry + 3.0 × ATR (R:R = 1.5)
    default_holding_days: 3
    max_holding_days: 5
    # v4.1: trailing stop & SL bounds
    trailing_activation_pct: 0.50
    trailing_distance_pct: 0.40
    sl_max_pct: 0.06
    sl_min_pct: 0.015

  swing:
    max_recommendations: 5
    news_weight: 0.40
    tech_weight: 0.35
    fundamental_weight: 0.25
    default_stop_loss_pct: 0.94       # -6% (was -8%)
    default_take_profit_pct: 1.12     # +12% (was +15%)
    take_profit_2_pct: 1.20           # +20% (was +25%)
    atr_sl_multiplier: 2.0
    atr_tp_multiplier: 3.5
    default_holding_days: 10
    max_holding_days: 30
    # v4.1: trailing stop & SL bounds
    trailing_activation_pct: 0.40
    trailing_distance_pct: 0.35
    sl_max_pct: 0.10
    sl_min_pct: 0.015

  win_rate:
    short_retention_days: 21
    swing_retention_days: 90
    evaluation_retention_days: 21
    enable_auto_cleanup: true

# Stock pool
stock_pool:
  us_stock:
    - index: "^GSPC"
      name: "S&P 500"
    - index: "^NDX"
      name: "Nasdaq 100"
  hk_stock:
    - index: "^HSI"
      name: "Hang Seng Index"
    - index: "^HSTECH"
      name: "Hang Seng Tech"

# Market parameters
market:
  us_stock:
    currency: "USD"
    currency_symbol: "$"
    timezone: "America/New_York"
    trading_hours: "09:30-16:00"
  hk_stock:
    currency: "HKD"
    currency_symbol: "HK$"
    timezone: "Asia/Hong_Kong"
    trading_hours: "09:30-16:00"
