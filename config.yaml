# Alpha Vault - US/HK AI Investment Research System
# Restart service after modification

app:
  name: "Alpha Vault"
  version: "3.0.0"
  host: "0.0.0.0"
  port: 8000
  debug: false

# News data sources (multi-source aggregation)
# Register free API keys:
#   Finnhub: https://finnhub.io/register (60 calls/min free)
#   MarketAux: https://www.marketaux.com/register (free tier)
# Sources without keys (Yahoo Finance, Google News RSS, SEC EDGAR) always active
news_sources:
  finnhub_key: ""
  marketaux_key: ""
  max_per_source: 10
  max_total: 15

# LLM settings (OpenAI API compatible)
llm:
  enabled: false
  base_url: ""
  model: ""
  api_key: ""
  temperature: 0.3
  max_tokens: 2048
  timeout: 60

# LLM Agent settings (6-layer: screen->enrich->news_agent->tech_agent->synthesis->risk_control)
agent:
  enabled: true
  news_version: "news-sentiment-v2"
  tech_version: "technical-v2"
  max_retries: 1
  batch_size: 40

  fallback:
    base_score: 50
    ma_bullish_bonus: 12
    ma_short_golden_bonus: 5
    ma_bearish_penalty: 10
    volume_ratio_strong: 1.5
    volume_strong_bonus: 8
    volume_ratio_medium: 1.0
    volume_medium_bonus: 3
    entry_discount: 0.995
    stop_loss_pct: 0.95
    take_profit_pct: 1.08
    holding_days: 3

# Built-in scheduler (triggers pipelines independently per market)
# Times are in local timezone: US = Eastern Time, HK = Hong Kong Time
scheduler:
  enabled: false
  us_run_time: "07:30"
  hk_run_time: "07:30"

# Pipeline parameters
pipeline:
  max_candidates: 40
  max_recommendations: 20

  screening:
    min_market_cap: 1.0e9
    min_avg_volume: 500000
    max_pe: 80.0
    min_pe: 0
    max_pb: 15.0
    weight_volume: 0.25
    weight_momentum: 0.30
    weight_market_cap: 0.20
    weight_volatility: 0.25

  synthesis:
    news_weight: 0.35
    tech_weight: 0.65
    fundamental_weight: 0.0
    min_confidence: 40
    quality_threshold: 50
    adaptive_threshold_drop: 20
    adaptive_threshold_floor: 30
    cross_fill_factor: 0.3

  short_term:
    max_recommendations: 8
    news_weight: 0.30
    tech_weight: 0.50
    fundamental_weight: 0.20
    default_stop_loss_pct: 0.95
    default_take_profit_pct: 1.08
    take_profit_2_pct: 1.12
    default_holding_days: 3
    max_holding_days: 5

  swing:
    max_recommendations: 8
    news_weight: 0.40
    tech_weight: 0.35
    fundamental_weight: 0.25
    default_stop_loss_pct: 0.92
    default_take_profit_pct: 1.15
    take_profit_2_pct: 1.25
    default_holding_days: 10
    max_holding_days: 30

  win_rate:
    short_retention_days: 21
    swing_retention_days: 90
    evaluation_retention_days: 21
    enable_auto_cleanup: true

# Stock pool
stock_pool:
  us_stock:
    - index: "^GSPC"
      name: "S&P 500"
    - index: "^NDX"
      name: "Nasdaq 100"
  hk_stock:
    - index: "^HSI"
      name: "Hang Seng Index"
    - index: "^HSTECH"
      name: "Hang Seng Tech"

# Market parameters
market:
  us_stock:
    currency: "USD"
    currency_symbol: "$"
    timezone: "America/New_York"
    trading_hours: "09:30-16:00"
  hk_stock:
    currency: "HKD"
    currency_symbol: "HK$"
    timezone: "Asia/Hong_Kong"
    trading_hours: "09:30-16:00"
