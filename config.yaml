# Alpha Vault - 港股/美股 AI 投研系统
# 修改此文件后需重启服务生效

app:
  name: "Alpha Vault"
  version: "2.0.0"
  host: "0.0.0.0"
  port: 8000
  debug: false

# LLM 设置（兼容 OpenAI API 协议）
llm:
  enabled: false
  base_url: ""
  model: ""
  api_key: ""
  temperature: 0.3
  max_tokens: 2048
  timeout: 60

# LLM Agent 设置
agent:
  enabled: false                   # 是否启用 LLM Agent 参与每日推荐评分
  news_version: "news-sentiment-v1"
  tech_version: "technical-v1"
  max_retries: 1                   # LLM 调用失败后重试次数
  batch_size: 20                   # 每批发送给 Agent 的股票数量

  fallback:                        # Agent 失败时的确定性打分参数
    base_score: 50
    ma_bullish_bonus: 12
    ma_short_golden_bonus: 5
    ma_bearish_penalty: 10
    volume_ratio_strong: 1.5
    volume_strong_bonus: 8
    volume_ratio_medium: 1.0
    volume_medium_bonus: 3
    entry_discount: 0.995
    stop_loss_pct: 0.95
    take_profit_pct: 1.08
    holding_days: 3

# Pipeline 参数
pipeline:
  max_candidates: 40
  max_recommendations: 20

  screening:
    min_market_cap: 1.0e9          # 最小市值（美元），10亿
    min_avg_volume: 500000         # 最近20日均成交量
    max_pe: 80.0                   # PE(TTM) 上限
    min_pe: 0                      # PE 下限（排除负值设0）
    max_pb: 15.0                   # PB 上限
    weight_volume: 0.25            # 成交量排名权重
    weight_momentum: 0.30          # 动量排名权重
    weight_market_cap: 0.20        # 市值排名权重
    weight_volatility: 0.25        # 波动率排名权重

  synthesis:
    news_weight: 0.35
    tech_weight: 0.40
    fundamental_weight: 0.25
    min_confidence: 50
    quality_threshold: 45
    adaptive_threshold_drop: 20    # 弱市自适应降低阈值幅度
    adaptive_threshold_floor: 30   # 自适应阈值下限

  short_term:
    max_recommendations: 8
    news_weight: 0.30
    tech_weight: 0.50
    fundamental_weight: 0.20
    default_stop_loss_pct: 0.95
    default_take_profit_pct: 1.08
    take_profit_2_pct: 1.12
    default_holding_days: 3
    max_holding_days: 5

  swing:
    max_recommendations: 8
    news_weight: 0.40
    tech_weight: 0.35
    fundamental_weight: 0.25
    default_stop_loss_pct: 0.92
    default_take_profit_pct: 1.15
    take_profit_2_pct: 1.25
    default_holding_days: 10
    max_holding_days: 30

  win_rate:
    short_retention_days: 21
    swing_retention_days: 90
    evaluation_retention_days: 21
    enable_auto_cleanup: true

# 股票池配置
stock_pool:
  us_stock:
    - index: "^GSPC"               # 标普500
      name: "S&P 500"
    - index: "^NDX"                # 纳斯达克100
      name: "Nasdaq 100"
  hk_stock:
    - index: "^HSI"                # 恒生指数
      name: "Hang Seng Index"
    - index: "^HSTECH"             # 恒生科技指数
      name: "Hang Seng Tech"

# 市场参数
market:
  us_stock:
    currency: "USD"
    currency_symbol: "$"
    timezone: "America/New_York"
    trading_hours: "09:30-16:00"
  hk_stock:
    currency: "HKD"
    currency_symbol: "HK$"
    timezone: "Asia/Hong_Kong"
    trading_hours: "09:30-16:00"
