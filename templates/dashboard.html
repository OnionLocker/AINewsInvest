{% extends "base.html" %}
{% block title %}Alpha Vault - AI 投研{% endblock %}

{% block content %}
<div class="av-container">

    <!-- 市场标签切换 -->
    <div class="av-tabs-wrap">
        <div class="av-tabs" id="marketTabs">
            <button class="av-tab active" data-market="a_share">
                <i class="bi bi-currency-yen"></i> A 股
            </button>
            <button class="av-tab" data-market="us_stock">
                <i class="bi bi-currency-dollar"></i> 美股
            </button>
            <button class="av-tab" data-market="hk_stock">
                <i class="bi bi-currency-exchange"></i> 港股
            </button>
            <button class="av-tab" data-market="fund">
                <i class="bi bi-pie-chart"></i> 基金
            </button>
        </div>
    </div>

    <!-- 市场概览指标条 -->
    <div class="av-metrics" id="marketMetrics">
        <div class="av-metric-card">
            <div class="av-metric-label">今日推荐</div>
            <div class="av-metric-value" id="metricCount">--</div>
        </div>
        <div class="av-metric-card">
            <div class="av-metric-label">看多信号</div>
            <div class="av-metric-value text-success" id="metricBull">--</div>
        </div>
        <div class="av-metric-card">
            <div class="av-metric-label">看空信号</div>
            <div class="av-metric-value text-danger" id="metricBear">--</div>
        </div>
        <div class="av-metric-card">
            <div class="av-metric-label">综合情绪</div>
            <div class="av-metric-value" id="metricSentiment">--</div>
        </div>
    </div>

    <!-- 推荐列表区域 -->
    <div class="av-section-header">
        <h6><i class="bi bi-stars me-2"></i>AI 投研推荐</h6>
        <span class="av-section-sub" id="sectionSub">基于新闻面 + 技术面综合分析</span>
    </div>

    <div class="av-card-list" id="recommendList">
        <!-- JS 动态渲染 -->
    </div>

    <!-- 空状态 -->
    <div class="av-empty" id="emptyState" style="display:none;">
        <i class="bi bi-robot"></i>
        <p>AI 分析师正在准备中...</p>
        <span>系统将在接入数据源后自动生成投研建议</span>
    </div>

</div>
{% endblock %}

// ── 渲染逻辑 ───────────────────────────────────────────────────

function renderMarket(market) {
    const data = MOCK_DATA[market];
    if (!data) return;

    // 更新指标条
    document.getElementById('metricCount').textContent = data.metrics.count;
    document.getElementById('metricBull').textContent = data.metrics.bull;
    document.getElementById('metricBear').textContent = data.metrics.bear;
    const sentEl = document.getElementById('metricSentiment');
    sentEl.textContent = data.metrics.sentiment;
    sentEl.className = 'av-metric-value ' + data.sentimentClass;

    // 渲染推荐卡片
    const list = document.getElementById('recommendList');
    const empty = document.getElementById('emptyState');

    if (data.items.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'flex';
        return;
    }

    empty.style.display = 'none';
    list.innerHTML = data.items.map(item => `
        <div class="av-rec-card">
            <div class="av-rec-header">
                <div class="av-rec-title">
                    <span class="av-ticker">${item.ticker}</span>
                    <span class="av-name">${item.name}</span>
                </div>
                <div class="av-rec-right">
                    <span class="av-price">${item.price}</span>
                    <span class="av-change ${item.change.startsWith('+') ? 'up' : 'down'}">${item.change}</span>
                </div>
            </div>

            <div class="av-rec-badges">
                <span class="av-badge-dir ${item.direction}">${item.dirLabel}</span>
                <span class="av-badge-conf">
                    <i class="bi bi-bullseye me-1"></i>置信度 ${item.confidence}%
                </span>
                <div class="av-conf-bar">
                    <div class="av-conf-fill ${item.direction}" style="width:${item.confidence}%"></div>
                </div>
            </div>

            <div class="av-rec-analysis">
                <div class="av-analysis-block">
                    <div class="av-analysis-tag news"><i class="bi bi-newspaper me-1"></i>新闻面</div>
                    <p>${item.newsReason}</p>
                </div>
                <div class="av-analysis-block">
                    <div class="av-analysis-tag tech"><i class="bi bi-graph-up me-1"></i>技术面</div>
                    <p>${item.techReason}</p>
                </div>
            </div>
        </div>
    `).join('');
}

// ── 标签切换 ───────────────────────────────────────────────────

document.querySelectorAll('.av-tab').forEach(tab => {
    tab.addEventListener('click', function() {
        document.querySelectorAll('.av-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderMarket(this.dataset.market);
    });
});

// 默认加载 A 股
renderMarket('a_share');
</script>
