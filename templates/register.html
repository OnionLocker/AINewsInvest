{% extends "base.html" %}
{% block title %}注册 - Alpha Vault{% endblock %}

{% block content %}
<div class="av-auth-wrap">
    <div class="av-auth-card">
        <div class="av-auth-title">创建账号</div>
        <div class="av-auth-subtitle">注册后即可使用 AI 投研功能</div>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username"
                       name="username" required autofocus placeholder="请输入用户名">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password"
                       name="password" required placeholder="至少 6 位">
            </div>
            <div class="mb-4">
                <label for="confirm" class="form-label">确认密码</label>
                <input type="password" class="form-control" id="confirm"
                       name="confirm" required placeholder="再次输入密码">
            </div>
            <button type="submit" class="av-auth-btn success">注 册</button>
        </form>

        <hr class="av-divider">
        <div class="av-auth-footer">
            已有账号？<a href="{{ url_for('login') }}">去登录</a>
        </div>
    </div>
</div>
{% endblock %}
