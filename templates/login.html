{% extends "base.html" %}
{% block title %}登录 - Alpha Vault{% endblock %}

{% block content %}
<div class="av-auth-wrap">
    <div class="av-auth-card">
        <div class="av-auth-title">欢迎回来</div>
        <div class="av-auth-subtitle">登录 Alpha Vault 投研系统</div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username"
                       name="username" required autofocus placeholder="请输入用户名">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password"
                       name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="av-auth-btn primary">登 录</button>
        </form>

        <hr class="av-divider">
        <div class="av-auth-footer">
            还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
