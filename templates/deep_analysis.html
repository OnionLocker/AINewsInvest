{% extends "base.html" %}
{% block title %}Alpha Vault - 深度分析{% endblock %}

{% block content %}
<div class="av-container">

    <div class="av-section-header">
        <h6><i class="bi bi-search-heart me-2"></i>涓偂深度分析</h6>
        <span class="av-section-sub">技术面 + 基本面 + 估值 + AI 综合研判</span>
    </div>

    <div class="av-deep-search">
        <input type="text" id="deepTicker" class="av-search-input" placeholder="杈撳叆股票代码锛屽 600519銆丄APL0700">
        <select id="deepMarket">
            <option value="a_share">A 股</option>
            <option value="us_stock">美股</option>
            <option value="hk_stock">娓偂</option>
        </select>
        <button class="av-deep-btn" id="btnDeep" onclick="runDeepAnalysis()">
            <i class="bi bi-lightning-charge"></i>开始分析
        </button>
    </div>

    <div id="deepLoading" style="display:none;">
        <div class="av-deep-progress">
            <div class="av-deep-progress-bar">
                <div class="av-deep-progress-fill" id="progressFill"></div>
            </div>
            <div class="av-deep-progress-text" id="progressText"></div>
        </div>
    </div>



    <div id="deepResult" style="display:none;">

        <!-- 概览 -->
        <div class="av-deep-section">
            <div class="av-deep-section-head">
                <i class="bi bi-info-circle"></i>分析概览
            </div>
            <div class="av-deep-section-body">
                <div class="av-deep-grid" id="overviewGrid"></div>
            </div>
        </div>

        <!-- 技术面 -->
        <div class="av-deep-section">
            <div class="av-deep-section-head">
                <i class="bi bi-graph-up" style="color:var(--av-tag-tech)"></i>技术面分析
            </div>
            <div class="av-deep-section-body">
                <div class="av-deep-grid" id="techGrid"></div>
                <div class="av-deep-summary" id="techSummary"></div>
            </div>
        </div>

        <!-- 基本面 -->
        <div class="av-deep-section" id="fundSection">
            <div class="av-deep-section-head">
                <i class="bi bi-bar-chart-line" style="color:#059669"></i>基本面分析
            </div>
            <div class="av-deep-section-body">
                <div class="av-deep-grid" id="fundGrid"></div>
                <div id="fundCharts" style="display:none;margin-top:16px;">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                        <div style="position:relative;height:220px;"><canvas id="chartProfitability"></canvas></div>
                        <div style="position:relative;height:220px;"><canvas id="chartGrowth"></canvas></div>
                    </div>
                    <div style="position:relative;height:200px;margin-top:12px;"><canvas id="chartSafety"></canvas></div>
                </div>
                <div class="av-deep-summary" id="fundSummary"></div>
            </div>
        </div>

        <!-- 估值面 -->
        <div class="av-deep-section" id="valSection">
            <div class="av-deep-section-head">
                <i class="bi bi-calculator" style="color:#7c3aed"></i>估值分析
            </div>
            <div class="av-deep-section-body">
                <div class="av-deep-grid" id="valGrid"></div>
                <div id="valChart" style="display:none;margin-top:16px;">
                    <div style="position:relative;height:100px;"><canvas id="chartValBand"></canvas></div>
                </div>
                <div class="av-deep-summary" id="valSummary"></div>
            </div>
        </div>

        <!-- 新闻闈� -->
        <div class="av-deep-section">
            <div class="av-deep-section-head">
                <i class="bi bi-newspaper" style="color:var(--av-tag-news)"></i>新闻舆情
            </div>
            <div class="av-deep-section-body">
                <div class="av-deep-grid" id="newsGrid"></div>

            </div>
        </div>

        <!-- 烟蒂股分析 (A鑲′綆PB鏃舵樉绀�) -->
        <div class="av-deep-section" id="cigbuttSection" style="display:none;">
            <div class="av-deep-section-head">
                <i class="bi bi-piggy-bank" style="color:#b45309"></i>烟蒂股资产垫分析
            </div>
            <div class="av-deep-section-body">
                <div class="av-deep-grid" id="cigbuttGrid"></div>
                <div class="av-deep-summary" id="cigbuttLlm" style="white-space:pre-wrap;"></div>
            </div>
        </div>

        <!-- AI 深度分析 -->
        <div class="av-deep-section" id="llmSection">
            <div class="av-deep-section-head">
                <i class="bi bi-robot" style="color:var(--av-primary)"></i>AI 综合研判
            </div>
            <div class="av-deep-section-body">
                <div class="av-deep-summary" id="llmContent" style="white-space:pre-wrap;"></div>
            </div>
        </div>

        <!-- PDF 年报上传 -->
        <div class="av-deep-section">
            <div class="av-deep-section-head">
                <i class="bi bi-file-earmark-pdf" style="color:#dc2626"></i>年报 PDF 分析（可选）
            </div>
            <div class="av-deep-section-body">
                <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                    <input type="file" id="pdfFile" accept=".pdf" style="font-size:13px;color:var(--av-text-secondary);">
                    <button class="av-deep-btn" id="btnUploadPdf" onclick="uploadPdf()" style="padding:8px 16px;font-size:13px;">
                        <i class="bi bi-upload"></i>上传分析
                    </button>
                </div>
                <div id="pdfResult" style="display:none;margin-top:16px;">
                    <div class="av-deep-grid" id="pdfGrid"></div>
                    <div class="av-deep-summary" id="pdfSections" style="margin-top:12px;white-space:pre-wrap;"></div>
                    <div class="av-deep-summary" id="pdfLlm" style="margin-top:8px;white-space:pre-wrap;"></div>
                </div>
            </div>
        </div>

    </div>

    <div id="deepEmpty" class="av-empty" style="display:flex;">
        <i class="bi bi-search-heart"></i>
        <p>输入股票代码开始深度分析</p>
        <span>系统将从技术面、基本面、估值面和新闻面四个维度进行全方位分析</span>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
function fmt(v, suffix) {
    if (v == null || v === '' || v !== v) return '--';
    if (typeof v === 'number') return v.toFixed(2) + (suffix || '');
    return String(v) + (suffix || '');
}

function metricHtml(label, value) {
    return `<div class="av-deep-metric"><div class="av-deep-metric-label">${label}</div><div class="av-deep-metric-value">${value}</div></div>`;
}

async function runDeepAnalysis() {
    const ticker = document.getElementById('deepTicker').value.trim();
    const market = document.getElementById('deepMarket').value;
    if (!ticker) { alert('请输入股票代码'); return; }

    const btn = document.getElementById('btnDeep');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 分析中...';
    document.getElementById('deepEmpty').style.display = 'none';
    document.getElementById('deepResult').style.display = 'none';
    document.getElementById('deepLoading').style.display = '';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('progressText').textContent = '准备中...';

    try {
        const resp = await fetch('/api/deep-analysis-stream', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ticker, market})
        });

        if (!resp.ok) {
            const err = await resp.json();
            alert(err.error || '分析失败');
            document.getElementById('deepLoading').style.display = 'none';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-lightning-charge"></i>开始分析';
            return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const {value, done} = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, {stream: true});
            const lines = buffer.split('\n');
            buffer = lines.pop();
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                    const evt = JSON.parse(line.slice(6));
                    const pct = Math.round((evt.step / evt.total) * 100);
                    document.getElementById('progressFill').style.width = pct + '%';
                    document.getElementById('progressText').textContent = evt.msg;
                    if (evt.done && evt.result) {
                        renderDeepResult(evt.result);
                    }
                } catch(e) {}
            }
        }
    } catch(e) {
        alert('网络错误: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-lightning-charge"></i>开始分析';
        document.getElementById('deepLoading').style.display = 'none';
    }
}

function renderDeepResult(data) {
    document.getElementById('deepResult').style.display = '';
    renderCharts(data);

    // 概览
    const tech = data.technical || {};
    const fund = data.fundamental || {};
    const val = data.valuation || {};
    let overviewHtml = '';
    overviewHtml += metricHtml('当前价格', fmt(tech.price));
    overviewHtml += metricHtml('涨跌幅', fmt(tech.change_pct, '%'));
    if (fund.quality_score != null) overviewHtml += metricHtml('质量评分', fmt(fund.quality_score, '分'));
    if (val.safety_margin != null) overviewHtml += metricHtml('安全边际', fmt(val.safety_margin, '%'));
    if (val.penetration_return) overviewHtml += metricHtml('穿透回报', fmt(val.penetration_return.rate, '%'));
    overviewHtml += metricHtml('分析时间', data.generated_at ? data.generated_at.slice(0,16).replace('T',' ') : '--');
    document.getElementById('overviewGrid').innerHTML = overviewHtml;

    // 技术面
    let techHtml = '';
    if (tech.indicators) {
        const ind = tech.indicators;
        techHtml += metricHtml('RSI(14)', fmt(ind.rsi));
        techHtml += metricHtml('MACD', fmt(ind.macd));
        techHtml += metricHtml('MA5', fmt(ind.ma5));
        techHtml += metricHtml('MA20', fmt(ind.ma20));
        techHtml += metricHtml('MA60', fmt(ind.ma60));
        if (ind.bollinger_upper) techHtml += metricHtml('布林上轨', fmt(ind.bollinger_upper));
        if (ind.bollinger_lower) techHtml += metricHtml('布林下轨', fmt(ind.bollinger_lower));
    }
    techHtml += metricHtml('成交量', fmt(tech.volume));
    document.getElementById('techGrid').innerHTML = techHtml;
    document.getElementById('techSummary').innerHTML = tech.signal_summary || tech.summary || '暂无技术面总结';

    // 基本面
    const fundSection = document.getElementById('fundSection');
    if (fund && fund.quality_score != null) {
        fundSection.style.display = '';
        let fundHtml = '';
        const sc = fund.scores || {};
        fundHtml += metricHtml('质量总分', fmt(fund.quality_score, '分'));
        fundHtml += metricHtml('盈利能力', fmt(sc.profitability, '分'));
        fundHtml += metricHtml('成长性', fmt(sc.growth, '分'));
        fundHtml += metricHtml('安全性', fmt(sc.safety, '分'));
        fundHtml += metricHtml('盈利质量', fmt(sc.earnings_quality, '分'));
        const mk = fund.market_info || {};
        if (mk.pe) fundHtml += metricHtml('PE', fmt(mk.pe));
        if (mk.pb) fundHtml += metricHtml('PB', fmt(mk.pb));
        if (mk.market_cap) fundHtml += metricHtml('市值(亿)', fmt(mk.market_cap));
        document.getElementById('fundGrid').innerHTML = fundHtml;

        let fundSumText = fund.summary || '';
        if (fund.risk_flags && fund.risk_flags.length > 0) {
            fundSumText += '<br><span style="color:var(--av-danger);font-weight:600;">风险提示: ' + fund.risk_flags.join('') + '</span>';
        }
        document.getElementById('fundSummary').innerHTML = fundSumText;
    } else {
        fundSection.style.display = 'none';
    }

    // 估值面
    const valSection = document.getElementById('valSection');
    if (val && val.floor_price != null) {
        valSection.style.display = '';
        let valHtml = '';
        valHtml += metricHtml('地板价', fmt(val.floor_price));
        valHtml += metricHtml('安全边际', fmt(val.safety_margin, '%'));
        const pr = val.penetration_return || {};
        valHtml += metricHtml('穿透回报率', fmt(pr.rate, '%'));
        valHtml += metricHtml('穿透评级', pr.grade || '--');
        if (val.ev_ebitda) valHtml += metricHtml('EV/EBITDA', fmt(val.ev_ebitda));
        valHtml += metricHtml('安全结论', val.verdict || '--');
        document.getElementById('valGrid').innerHTML = valHtml;

        let valSum = val.summary || '';
        if (val.methods) {
            valSum += '<br><small style="color:var(--av-text-muted);">';
            val.methods.forEach(m => {
                valSum += m.name + ': ' + fmt(m.value) + '、';
            });
            valSum += '</small>';
        }
        document.getElementById('valSummary').innerHTML = valSum;
    } else {
        valSection.style.display = 'none';
    }

    // 新闻
    const newsData = data.news || {};
    const senti = newsData.sentiment || {};
    let newsGridHtml = '';
    newsGridHtml += metricHtml('情绪评分', fmt(senti.score));
    newsGridHtml += metricHtml('情绪倾向', senti.label || '--');
    newsGridHtml += metricHtml('新闻数量', (newsData.items || []).length);
    document.getElementById('newsGrid').innerHTML = newsGridHtml;

    const newsItems = newsData.items || [];
    if (newsItems.length > 0) {
        document.getElementById('newsList').innerHTML = newsItems.slice(0, 8).map(n => `
            <div style="padding:8px 0;border-bottom:1px solid var(--av-border);font-size:13px;">
                <a href="${n.url || '#'}" target="_blank" style="color:var(--av-text);text-decoration:none;">${n.title || '无标题'}</a>
                <span style="color:var(--av-text-muted);font-size:11px;margin-left:8px;">${n.source || ''} ${n.date || ''}</span>
            </div>
        `).join('');
    } else {
        document.getElementById('newsList').innerHTML = '<p style="color:var(--av-text-muted);font-size:13px;">暂无相关新闻</p>';
    }

    // LLM
    const llmSection = document.getElementById('llmSection');
    if (data.llm_analysis) {
        llmSection.style.display = '';
        const llm = data.llm_analysis;
        let content = '';
        if (typeof llm === 'string') {
            content = llm;
        } else if (llm.analysis) {
            content = llm.analysis;
        } else if (llm.content) {
            content = llm.content;
        } else {
            content = JSON.stringify(llm, null, 2);
        }
        document.getElementById('llmContent').textContent = content;
    } else {
        llmSection.style.display = 'none';
    }

    // 烟蒂股资产垫
    const cigbuttSection = document.getElementById('cigbuttSection');
    const cigbutt = (val && val.cigbutt) ? val.cigbutt : null;
    if (cigbutt) {
        cigbuttSection.style.display = '';
        let cigHtml = '';
        cigHtml += metricHtml('资产垫评级', cigbutt.grade || '--');
        cigHtml += metricHtml('T0 净有息负债/EBITDA', fmt(cigbutt.t0_net_debt_ebitda));
        cigHtml += metricHtml('T1 净现金/市值', fmt(cigbutt.t1_net_cash_pct, '%'));
        cigHtml += metricHtml('T2 NCAV/市值', fmt(cigbutt.t2_ncav_pct, '%'));
        cigHtml += metricHtml('综合得分', cigbutt.score + '/3');
        document.getElementById('cigbuttGrid').innerHTML = cigHtml;

        const cigLlm = data.cigbutt_analysis;
        if (cigLlm) {
            const cigText = cigLlm.cigbutt_analysis || cigLlm.analysis || JSON.stringify(cigLlm, null, 2);
            document.getElementById('cigbuttLlm').textContent = cigText;
        } else {
            document.getElementById('cigbuttLlm').textContent = '';
        }
    } else {
        cigbuttSection.style.display = 'none';
    }
}

async function uploadPdf() {
    const fileInput = document.getElementById('pdfFile');
    if (!fileInput.files || fileInput.files.length === 0) {
        alert('请选择 PDF 文件');
        return;
    }
    const btn = document.getElementById('btnUploadPdf');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 分析中...';

    const formData = new FormData();
    formData.append('pdf', fileInput.files[0]);

    try {
        const resp = await fetch('/api/upload-report', {
            method: 'POST',
            body: formData,
        });
        const data = await resp.json();
        if (!resp.ok) { alert(data.error || '上传失败'); return; }
        renderPdfResult(data);
    } catch(e) {
        alert('网络错误: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-upload"></i>上传分析';
    }
}

function renderPdfResult(data) {
    document.getElementById('pdfResult').style.display = '';

    let gridHtml = '';
    gridHtml += metricHtml('文件', data.file_name || '--');
    gridHtml += metricHtml('总页数', data.total_pages || '--');
    gridHtml += metricHtml('提取章节', data.extracted_count + '/7');
    document.getElementById('pdfGrid').innerHTML = gridHtml;

    let sectionsText = '';
    if (data.sections) {
        for (const [key, sec] of Object.entries(data.sections)) {
            if (sec.content) {
                sectionsText += `\n【${sec.label}】(${sec.page_range})\n${sec.content}\n`;
            }
        }
    }
    document.getElementById('pdfSections').textContent = sectionsText || '未提取到关键章节';

    if (data.llm_summary) {
        document.getElementById('pdfLlm').textContent = '\n📋 AI 年报分析:\n' + data.llm_summary;
        document.getElementById('pdfLlm').style.display = '';
    } else {
        document.getElementById('pdfLlm').style.display = 'none';
    }
}

document.getElementById('deepTicker').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') runDeepAnalysis();
});

(function() {
    const params = new URLSearchParams(window.location.search);
    const ticker = params.get('ticker');
    const market = params.get('market');
    if (ticker) {
        document.getElementById('deepTicker').value = ticker;
        if (market) document.getElementById('deepMarket').value = market;
        runDeepAnalysis();
    }
})();


let _charts = {};
function _destroyChart(id) { if(_charts[id]) { _charts[id].destroy(); delete _charts[id]; } }

function renderCharts(data) {
    const cd = data.chart_data;
    if (!cd || !cd.years || cd.years.length < 2) {
        document.getElementById('fundCharts').style.display = 'none';
        document.getElementById('valChart').style.display = 'none';
        return;
    }

    document.getElementById('fundCharts').style.display = '';
    const labels = cd.years;
    const primary = getComputedStyle(document.documentElement).getPropertyValue('--av-primary').trim() || '#6366f1';
    const success = '#059669';
    const warning = '#d97706';
    const danger  = '#dc2626';
    const textColor = getComputedStyle(document.documentElement).getPropertyValue('--av-text-secondary').trim() || '#6b7280';
    const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--av-border').trim() || '#e5e7eb';

    const baseOpts = {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: textColor, font: {size:11} } } },
        scales: {
            x: { ticks: {color: textColor, font:{size:10}}, grid: {color: gridColor} },
            y: { ticks: {color: textColor, font:{size:10}}, grid: {color: gridColor} }
        }
    };

    _destroyChart('chartProfitability');
    _charts['chartProfitability'] = new Chart(document.getElementById('chartProfitability'), {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: 'ROE (%)', data: cd.roe, borderColor: primary, backgroundColor: primary+'33', tension: 0.3, fill: false, pointRadius: 3 },
                { label: '毛利率 (%)', data: cd.gross_margin, borderColor: success, backgroundColor: success+'33', tension: 0.3, fill: false, pointRadius: 3 },
                { label: '净利率 (%)', data: cd.net_margin, borderColor: warning, backgroundColor: warning+'33', tension: 0.3, fill: false, pointRadius: 3 }
            ]
        },
        options: { ...baseOpts, plugins: { ...baseOpts.plugins, title: { display: true, text: '盈利能力', color: textColor, font:{size:12} } } }
    });

    _destroyChart('chartGrowth');
    _charts['chartGrowth'] = new Chart(document.getElementById('chartGrowth'), {
        type: 'bar',
        data: {
            labels,
            datasets: [
                { label: '营收增速 (%)', data: cd.revenue_growth, backgroundColor: primary+'99', borderColor: primary, borderWidth: 1 },
                { label: '利润增速 (%)', data: cd.profit_growth, backgroundColor: success+'99', borderColor: success, borderWidth: 1 }
            ]
        },
        options: { ...baseOpts, plugins: { ...baseOpts.plugins, title: { display: true, text: '成长性', color: textColor, font:{size:12} } } }
    });

    _destroyChart('chartSafety');
    _charts['chartSafety'] = new Chart(document.getElementById('chartSafety'), {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: '负债率 (%)', data: cd.debt_ratio, borderColor: danger, tension: 0.3, fill: false, pointRadius: 3, yAxisID: 'y' },
                { label: '流动比率', data: cd.current_ratio, borderColor: primary, tension: 0.3, fill: false, pointRadius: 3, yAxisID: 'y1' }
            ]
        },
        options: {
            ...baseOpts,
            plugins: { ...baseOpts.plugins, title: { display: true, text: '财务安全性', color: textColor, font:{size:12} } },
            scales: {
                ...baseOpts.scales,
                y: { ...baseOpts.scales.y, position: 'left', title: { display: true, text: '负债率 %', color: textColor } },
                y1: { position: 'right', ticks: {color: textColor}, grid: {drawOnChartArea: false}, title: { display: true, text: '流动比率', color: textColor } }
            }
        }
    });

    // Valuation band chart
    const v = cd.valuation;
    if (v && v.current_price) {
        document.getElementById('valChart').style.display = '';
        const price = v.current_price;
        const ncav = v.ncav_per_share || 0;
        const bvps = v.bvps || 0;
        const target = v.target_price || price * 1.3;
        const max = Math.max(price, target, bvps) * 1.2;

        _destroyChart('chartValBand');
        _charts['chartValBand'] = new Chart(document.getElementById('chartValBand'), {
            type: 'bar',
            data: {
                labels: ['估值区间'],
                datasets: [
                    { label: 'NCAV', data: [ncav], backgroundColor: '#059669cc', barPercentage: 0.6 },
                    { label: 'BVPS (每股净资产)', data: [bvps], backgroundColor: '#6366f1cc', barPercentage: 0.6 },
                    { label: '当前价', data: [price], backgroundColor: '#d97706cc', barPercentage: 0.6 },
                    { label: '目标价', data: [target], backgroundColor: '#dc2626cc', barPercentage: 0.6 }
                ]
            },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: textColor, font:{size:11} } }, title: { display: true, text: '估值区间对比', color: textColor, font:{size:12} } },
                scales: {
                    x: { max: max, ticks: {color: textColor}, grid: {color: gridColor} },
                    y: { ticks: {color: textColor}, grid: {color: gridColor} }
                }
            }
        });
    } else {
        document.getElementById('valChart').style.display = 'none';
    }
}

</script>
{% endblock %}
